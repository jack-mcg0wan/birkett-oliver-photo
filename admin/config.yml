# ─────────────────────────────────────────────────────────────
#  Decap CMS config for Birkett Oliver Photography
#  OAuth is handled by Cloudflare Worker
# ─────────────────────────────────────────────────────────────

backend:
  name: github
  repo: jack-mcg0wan/birkett-oliver-photo
  branch: main
  base_url: https://birkett-oliver-oauth.jackjosephmcgowan.workers.dev
  auth_endpoint: auth

# Where uploaded images get stored in the repo
media_folder: "images"
public_folder: "images"

collections:
  # ── GALLERY ──────────────────────────────────────────────
  - name: "gallery"
    label: "Gallery"
    files:
      - name: "photos"
        label: "Photo List"
        file: "photos.json"
        description: "Add, remove, or reorder photos. Changes go live after saving."
        fields:
          - label: "Photos"
            name: "photos"
            widget: "list"
            summary: "{{fields.alt}}"
            fields:
              - label: "Image"
                name: "file"
                widget: "image"
                hint: "Upload a new photo or choose an existing one"
              - label: "Caption / Alt text"
                name: "alt"
                widget: "string"
                hint: "Brief description (used for accessibility)"
                required: false

  # ── SITE SETTINGS ────────────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "site"
        label: "General"
        file: "settings.json"
        fields:
          - label: "Tagline (under hero logo)"
            name: "tagline"
            widget: "string"
            default: "Photographer · London"
          - label: "Contact email"
            name: "email"
            widget: "string"
          - label: "Instagram URL"
            name: "instagram"
            widget: "string"
            required: false
          - label: "Marquee text (comma-separated)"
            name: "marquee"
            widget: "string"
            default: "Editorial, Fashion, Portrait, Commercial, Lifestyle, London"
            hint: "Items separated by commas"
