<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birkett Oliver — Photography</title>
  <meta name="description" content="Oliver Birkett — photographer based in London." />

  <style>
    /* ═══════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════ */
    :root {
      --black: #000000;
      --white: #f0efeb;
      --grey:  #666;
      --gap:   3px;
    }

    /* ═══════════════════════════════════════
       BASE
    ═══════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: bold;
      font-size: 13px;
      letter-spacing: .04em;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; object-fit: cover; }

    /* ═══════════════════════════════════════
       HEADER
    ═══════════════════════════════════════ */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem 2rem;
      min-height: 75px;
      background: rgba(30, 30, 30, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .nav-contact {
      position: absolute;
      right: 2rem;
    }
    .logo {
      display: flex;
      align-items: center;
    }
    .logo img {
      height: 45px;
      max-height: 45px;
      width: auto !important;
    }
    .nav-contact {
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      border: 1px solid rgba(240,239,235,.35);
      padding: .45rem 1.1rem;
      border-radius: 100px;
      color: var(--white);
      transition: background .2s, color .2s;
    }
    .nav-contact:hover {
      background: var(--white);
      color: var(--black);
    }

    /* ═══════════════════════════════════════
       HERO
    ═══════════════════════════════════════ */
    #hero {
      position: relative;
      height: 67svh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--black);
      padding-top: 70px;
    }
    .hero-bg { display: none; }
    .hero-center {
      position: relative;
      z-index: 2;
      text-align: center;
    }
    .hero-logo {
      width: min(652px, 67.5vw);
      max-height: 240px;
      object-fit: contain;
      filter: none;
      display: block;
      margin: 0 auto;
    }
    .hero-tagline {
      margin-top: 1.2rem;
      font-size: 7px;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: rgba(240,239,235,.85);
    }
    .hero-scroll { display: none; }

    /* ═══════════════════════════════════════
       MARQUEE
    ═══════════════════════════════════════ */
    .marquee-wrap {
      border-top: 1px solid #1e1e1e;
      border-bottom: 1px solid #1e1e1e;
      overflow: hidden;
      white-space: nowrap;
      padding: .8rem 0;
    }
    .marquee-track {
      display: inline-flex;
      animation: scroll 30s linear infinite;
    }
    .marquee-track:hover { animation-play-state: paused; }
    .marquee-item {
      font-size: 10px;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--grey);
      padding: 0 2.4rem;
    }
    .marquee-dot { color: #333; padding: 0 .3rem; }
    @keyframes scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ═══════════════════════════════════════
       GALLERY  — 3-col masonry-style, no gaps
    ═══════════════════════════════════════ */
    #work { padding-top: var(--gap); }

    .gallery {
      columns: 3;
      column-gap: var(--gap);
      padding: 0 var(--gap) var(--gap);
    }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: var(--gap);
      overflow: hidden;
      position: relative;
      display: block;
    }
    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform .6s cubic-bezier(.22,.61,.36,1);
    }
    .gallery-item:hover img { transform: scale(1.04); }

    /* loading skeleton */
    .gallery-item img[data-src] {
      background: #181818;
      min-height: 200px;
    }

    @media (max-width: 700px) {
      .gallery { columns: 2; }
      .hero-logo { width: min(348px, 36vw); }
      .logo img { height: 24px; max-height: 24px; }
    }

    /* ═══════════════════════════════════════
       CONTACT
    ═══════════════════════════════════════ */
    #contact {
      border-top: 1px solid #1e1e1e;
      padding: 5rem 2rem 4rem;
      max-width: 560px;
      margin: 0 auto;
    }
    #contact h2 {
      font-size: 10px;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--grey);
      margin-bottom: 2.5rem;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .form-field {
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }
    .form-field.full { grid-column: 1 / -1; }
    label {
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--grey);
    }
    input, textarea {
      background: transparent;
      border: none;
      border-bottom: 1px solid #2a2a2a;
      color: var(--white);
      font-family: inherit;
      font-size: 13px;
      padding: .6rem 0;
      outline: none;
      transition: border-color .2s;
      width: 100%;
      resize: none;
    }
    input:focus, textarea:focus { border-color: var(--white); }
    textarea { min-height: 100px; }

    /* honeypot */
    .hp { display: none; }

    .submit-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .btn-submit {
      background: var(--white);
      color: var(--black);
      border: none;
      padding: .75rem 2.2rem;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      border-radius: 100px;
      transition: opacity .2s;
    }
    .btn-submit:hover { opacity: .8; }
    #form-msg {
      font-size: 11px;
      letter-spacing: .1em;
      color: var(--grey);
    }

    /* ═══════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════ */
    footer {
      border-top: 1px solid #1a1a1a;
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .footer-copy {
      font-size: 10px;
      letter-spacing: .12em;
      color: #333;
    }
    .footer-links {
      display: flex;
      gap: 2rem;
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--grey);
    }
    .footer-links a { transition: color .2s; }
    .footer-links a:hover { color: var(--white); }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <a class="logo" href="/" aria-label="Birkett Oliver home">
      <img src="assets/BIRKETT-OLIVER.png" alt="Birkett Oliver" />
    </a>
    <a class="nav-contact" href="#contact">Contact</a>
  </header>

  <!-- ── HERO ── -->
  <section id="hero">
    <div class="hero-bg"></div>
    <div class="hero-center">
      <img class="hero-logo" src="assets/bo_gif.gif" alt="Birkett Oliver" />
      <p class="hero-tagline">Photographer Based in London</p>
    </div>
    <span class="hero-scroll" aria-hidden="true">↓ scroll</span>
  </section>

  <!-- ── GALLERY ── (populated from photos.json via JS) -->
  <section id="work">
    <div class="gallery" id="gallery"></div>
  </section>

  <!-- ── CONTACT ── -->
  <section id="contact">
    <h2>Get in touch</h2>
    <!--
      Web3Forms: replace ACCESS_KEY below with Oliver's key from web3forms.com
      SWAP EMAIL: also set the email on the hidden input below
    -->
    <form id="contact-form" action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="REPLACE_WITH_WEB3FORMS_KEY" />
      <!-- ── SWAP: Oliver's email ── -->
      <input type="hidden" name="from_name" value="Birkett Oliver Website" />
      <input type="hidden" name="subject" value="New enquiry via birkettoliverphoto.com" />
      <input type="hidden" name="redirect" value="false" />
      <!-- honeypot -->
      <input type="checkbox" name="botcheck" class="hp" tabindex="-1" autocomplete="off" />

      <div class="form-row">
        <div class="form-field">
          <label for="fname">Name</label>
          <input type="text" id="fname" name="name" required autocomplete="name" />
        </div>
        <div class="form-field">
          <label for="femail">Email</label>
          <input type="email" id="femail" name="email" required autocomplete="email" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-field full">
          <label for="fsubject">Subject</label>
          <input type="text" id="fsubject" name="subject_line" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-field full">
          <label for="fmessage">Message</label>
          <textarea id="fmessage" name="message" required></textarea>
        </div>
      </div>
      <div class="submit-row">
        <button type="submit" class="btn-submit">Send</button>
        <span id="form-msg"></span>
      </div>
    </form>
  </section>

  <!-- ── FOOTER ── -->
  <footer>
    <span class="footer-copy">© 2025 Birkett Oliver. All rights reserved.</span>
    <nav class="footer-links">
      <a href="https://instagram.com/_birkettoliver" target="_blank" rel="noopener">@_birkettoliver</a>
      <a href="mailto:jackjosephmcgowan@gmail.com">Email</a><!-- ── SWAP: Oliver's email ── -->
    </nav>
  </footer>

  <!-- ══════════════════════════════════════
       JAVASCRIPT
  ══════════════════════════════════════ -->
  <script>
    /* ── hero load animation ── */
    window.addEventListener('load', () => {
      document.getElementById('hero').classList.add('loaded');
    });

    /* ── build gallery from photos.json ── */
    const gallery = document.getElementById('gallery');
    const isMobile = window.innerWidth <= 700;

    fetch('photos.json')
      .then(r => r.json())
      .then(data => {
        const list = isMobile && data.photos_mobile ? data.photos_mobile : data.photos;
        list.forEach(p => {
          const item = document.createElement('div');
          item.className = 'gallery-item';
          const img = document.createElement('img');
          img.src = p.file;
          img.alt = p.alt || '';
          img.loading = 'lazy';
          item.appendChild(img);
          gallery.appendChild(item);
        });
      })
      .catch(() => {
        gallery.innerHTML = '<p style="color:#444;padding:2rem;font-size:12px;letter-spacing:.1em">No photos found. Add images via the admin panel.</p>';
      });

    /* ── contact form ── */
    const form = document.getElementById('contact-form');
    const msg  = document.getElementById('form-msg');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const btn = form.querySelector('.btn-submit');
      btn.textContent = 'Sending…';
      btn.disabled = true;

      try {
        const res  = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          body: new FormData(form),
        });
        const data = await res.json();
        if (data.success) {
          msg.textContent = 'Message sent. Thank you.';
          form.reset();
        } else {
          msg.textContent = 'Something went wrong — please try again.';
        }
      } catch {
        msg.textContent = 'Network error — please try again.';
      } finally {
        btn.textContent = 'Send';
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
